methodology_summary: |
  Rule-based ranker with 5 weighted scoring components and explicit honeypot detection.
  (1) Role fit (35%): title tiering, career history analysis for retrieval/search/ranking
  production experience, hidden-gem detection for candidates without exact keyword matches.
  (2) Skills match (25%): tiered weighting across retrieval, vector DB, ML, and evaluation
  skills, adjusted by proficiency, duration, and endorsements.
  (3) Experience quality (15%): 5-9 year sweet spot, product-company career trajectory,
  ML role duration ratio.
  (4) Location (10%): Pune/Noida preferred, Tier-1 Indian cities acceptable.
  (5) Behavioral signals (15%): recency, open-to-work, recruiter response rate, notice
  period, interview completion, GitHub activity, recruiter saves.
  Hard filters: honeypot detection via career-date impossibilities and impossible skill
  claims; consulting-only career filter. Soft penalties for title-chasers (<18mo avg
  tenure), CV/speech/robotics-only backgrounds, and pure research careers.
  Reasoning is generated per-candidate referencing specific profile facts and JD requirements,
  with honest concerns noted. Runtime: ~20 seconds for 100K candidates on CPU.

